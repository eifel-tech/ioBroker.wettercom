version: 2
updates:
    - package-ecosystem: npm
      directory: "/"
      schedule:
          interval: weekly
          time: "04:00"
          timezone: Europe/Berlin
      open-pull-requests-limit: 15
      assignees:
          - eifel-tech
      versioning-strategy: increase
      cooldown:
          default-days: 7

    - package-ecosystem: github-actions
      directory: "/"
      schedule:
          interval: weekly
          time: "04:00"
          timezone: Europe/Berlin
      open-pull-requests-limit: 15
      assignees:
          - eifel-tech
